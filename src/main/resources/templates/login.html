<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Login</title>
               <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * { 
        margin:0; 
        padding:0; 
        box-sizing:border-box; 
        font-family:'Segoe UI', Arial, sans-serif; 
    }
    body {
        background:#F5F7FA; 
        color:#1E293B; 
        min-height:100vh; 
    }
    
    nav { 
        background:#1E3A8A; 
        padding:16px 32px; 
        display:flex; 
        justify-content:space-between; 
        align-items:center; 
    }
    nav a { 
        color:white; 
        text-decoration:none; 
        margin-right:24px; 
        font-weight:500; 
    }
    nav a:hover { 
        color:#FF6B00; 
    }
    .btn-sair { 
        background:#FF6B00; 
        color:white; border:none; 
        padding:8px 16px; 
        border-radius:4px; 
        cursor:pointer; 
        font-weight:bold; 
    }
    .container { 
        max-width:1100px; 
        margin:32px auto; 
        padding:0 16px; 
    }
    .card { 
        background:white; 
        padding:24px; 
        border-radius:8px; 
        box-shadow:0 2px 6px rgba(0,0,0,0.08); 
        border-left:4px solid #1E3A8A; 
        margin-bottom:20px; 
    }
    
    .card-login { 
        max-width:420px; 
        margin:80px auto; 
        text-align:center; 
        border-left:none; 
    }
    .titulo { 
        font-size:22px; 
        color:#1E3A8A; 
        margin-bottom:24px; 
        font-weight:bold; 
    }
    .grupo { 
        text-align:left; 
        margin-bottom:16px; 
    }
    .grupo label { 
        display:block; 
        margin-bottom:6px;
        font-weight:600; 
        font-size:14px; 
    }
    .grupo input, .grupo select { 
        width:100%; 
        padding:12px; 
        border:1px solid #CBD5E1; 
        border-radius:4px; 
        font-size:15px; 
    }
    .botao { 
        width:100%; 
        padding:12px; 
        background:#1E3A8A; 
        color:white; border:none; 
        border-radius:4px; 
        font-weight:bold; 
        font-size:16px; 
        cursor:pointer; 
        margin-top:12px; 
    }
    .botao:hover { 
        background:#152a65; 
    }
    .botao-laranja { 
        background:#FF6B00; 
    }
    .botao-laranja:hover { 
        background:#d95800; 
    }
    .grid { 
        display:grid; 
        grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); 
        gap:20px; }
    .badge { 
        padding:4px 10px; 
        border-radius:12px; 
        font-size:12px; 
        font-weight:bold; 
    }
    .badge-azul { 
        background:#DBEAFE; 
        color:#1E40AF; 
    }
    .badge-laranja { 
        background:#FFEDD5; 
        color:#C2410C; 
    }
    .badge-verde { 
        background:#D1FAE5; 
        color:#065F46; 
    }
    </style>
    
            
<!-- 
SCRIPT.JS=

let titulo = document.;
botao.style.size=50px;

-Modo Escuro e Normal

id=unico

Validacao De Campo

 -->
 
    </head>
<body>
    
<div class="card card-login">
  <h1 class="titulo">Sistema Logístico de rastreamento</h1>
  
  <form th:action="@{/login}" method="post">
  
    <div class="grupo"><label>E-mail:</label>
    <input
        type="email" 
        class="campo"
        oninput="validacao()" 
        id="email"
        value="admin@logistica.com" 
        ></div>
      
    <div class="grupo"><label>Senha:</label>
    <input 
        type="password" 
        class="campo"
        oninput="validacao()" 
        id="senha" 
        value="admin123" 
        ></div>
    
    <button 
        type="submit" 
        disabled 
        class="botao" 
        id="botaologar"
        >Entrar</button>
  
  </form>
  <p style="margin-top:16px"><a th:href="@{/rastrear}" style="color:#FF6B00">Rastrear sem login</a></p>

  
     
  
</div>
</body></html>
