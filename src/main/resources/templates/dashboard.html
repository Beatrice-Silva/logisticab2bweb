<html xmlns:th="http://www.thymeleaf.org">
<head><link rel="stylesheet" th:href="@{/css/style.css}"><title>Dashboard</title></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container">
  <h1 class="titulo">Visão Geral</h1>
  <div class="grid">
    <div class="card"><div class="card-titulo">Criados</div><h2 th:text="${counts?.Criado ?: 0}">0</h2><span class="badge badge-azul">Aguardando</span></div>
    <div class="card"><div class="card-titulo">Em Trânsito</div><h2 th:text="${counts?.'Em transito' ?: 0}">0</h2><span class="badge badge-laranja">Em rota</span></div>
    <div class="card"><div class="card-titulo">Entregues</div><h2 th:text="${counts?.Entregue ?: 0}">0</h2><span class="badge badge-verde">Finalizado</span></div>
  </div>
</div>
</body></html>
