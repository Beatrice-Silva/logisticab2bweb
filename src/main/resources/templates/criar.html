<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Criação</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * { 
        margin:0; 
        padding:0; 
        box-sizing:border-box; 
        font-family:'Segoe UI', Arial, sans-serif; 
    }
    body {
        background:#F5F7FA; 
        color:#1E293B; 
        min-height:100vh; 
    }
    
    nav { 
        background:#1E3A8A; 
        padding:16px 32px; 
        display:flex; 
        justify-content:space-between; 
        align-items:center; 
    }
    nav a { 
        color:white; 
        text-decoration:none; 
        margin-right:24px; 
        font-weight:500; 
    }
    nav a:hover { 
        color:#FF6B00; 
    }
    .btn-sair { 
        background:#FF6B00; 
        color:white; border:none; 
        padding:8px 16px; 
        border-radius:4px; 
        cursor:pointer; 
        font-weight:bold; 
    }
    .container { 
        max-width:1100px; 
        margin:32px auto; 
        padding:0 16px; 
    }
    .card { 
        background:white; 
        padding:24px; 
        border-radius:8px; 
        box-shadow:0 2px 6px rgba(0,0,0,0.08); 
        border-left:4px solid #1E3A8A; 
        margin-bottom:20px; 
    }
    
    .card-login { 
        max-width:420px; 
        margin:80px auto; 
        text-align:center; 
        border-left:none; 
    }
    .titulo { 
        font-size:22px; 
        color:#1E3A8A; 
        margin-bottom:24px; 
        font-weight:bold; 
    }
    .grupo { 
        text-align:left; 
        margin-bottom:16px; 
    }
    .grupo label { 
        display:block; 
        margin-bottom:6px;
        font-weight:600; 
        font-size:14px; 
    }
    .grupo input, .grupo select { 
        width:100%; 
        padding:12px; 
        border:1px solid #CBD5E1; 
        border-radius:4px; 
        font-size:15px; 
    }
    .botao { 
        width:100%; 
        padding:12px; 
        background:#1E3A8A; 
        color:white; border:none; 
        border-radius:4px; 
        font-weight:bold; 
        font-size:16px; 
        cursor:pointer; 
        margin-top:12px; 
    }
    .botao:hover { 
        background:#152a65; 
    }
    .botao-laranja { 
        background:#FF6B00; 
    }
    .botao-laranja:hover { 
        background:#d95800; 
    }
    .grid { 
        display:grid; 
        grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); 
        gap:20px; }
    .badge { 
        padding:4px 10px; 
        border-radius:12px; 
        font-size:12px; 
        font-weight:bold; 
    }
    .badge-azul { 
        background:#DBEAFE; 
        color:#1E40AF; 
    }
    .badge-laranja { 
        background:#FFEDD5; 
        color:#C2410C; 
    }
    .badge-verde { 
        background:#D1FAE5; 
        color:#065F46; 
    }
    </style>
    
    </head>
   
    <div class="card card-login">
        <h1 class="titulo">Pacotes</h1>
        
        <form th:action="@{/criar}" method="post">
            

            <div class="grupo"><label>Código LON:</label>
            <input type=password name="codigoLON" required></div>
            <br>
     
            <div class="grupo"><label>OTP Código:</label></div>
            <input type=password name="OTPcodigo" required></div>
            <br>
            
            <div class="grupo"><label>OTP expira:</label></div>
            <input type=Date name="OTPexpira" required></div>
            <br>
            
            <div class="grupo"><label>Statuls atual:</label></div>
            <input type=text name="statusatual" required></div>
            <br>
            
            <div class="grupo"><label>Peso:</label></div>
            <input type=number name="peso" required></div>
            <br>
            
            <div class="grupo"><label>Observação ou Descrição:</label></div>
            <input type=text name="observdesc" required></div>
            <br>
            
            <button class="botao">Criar remessa</button>
            
        </form>
        <p style="margin-top: 16px"><a th:href="@{/}" style="color:#FFEDD5"></p>
    </div>
    
    <body>

    </body>
    
    
</html>
